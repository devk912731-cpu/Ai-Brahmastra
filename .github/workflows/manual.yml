name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Ye line permission error ko fix karegi
      - name: Fix permissions
        run: sudo chown -R runner:docker /home/runner/work/Ai-Brahmastra/Ai-Brahmastra

      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          workdir: .
          buildozer_version: master

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-Brahmastra-App
          path: bin/*.apk
