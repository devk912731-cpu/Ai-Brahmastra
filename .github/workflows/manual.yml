name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git python3 python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libssl-dev libjpeg-dev zlib1g-dev libffi8 liblzma-dev uuid-dev
          sudo apt install -y openjdk-17-jdk 

      - name: Setup Python and Buildozer
        run: |
          # Cython 0.29.36 version stability ke liye
          pip3 install --user --upgrade buildozer cython==0.29.36 virtualenv

      - name: Build with Buildozer (Force Step)
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Agar network error aaye toh ye step rukega nahi
          yes | buildozer android debug || yes | buildozer android debug
          
          # 🔱 MAGIC JUGAD: Pure server mein jahan bhi APK banti hai, use dhoond kar bahar lao
          echo "Forcing APK discovery..."
          find . -name "*.apk" -exec cp {} ./brahmastra_final.apk \;
          
          # Check karne ke liye ki file bahar aayi ya nahi
          ls -lh ./brahmastra_final.apk || echo "ERROR: APK NOT FOUND ANYWHERE"
        continue-on-error: false

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: My-Brahmastra-App
          # Ab server ko bhatakna nahi padega, file seedha samne hai
          path: brahmastra_final.apk
